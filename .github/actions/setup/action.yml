name: Setup Bun project
description: Node, Bun, cache e install

runs:
  using: composite
  steps:
    - uses: actions/setup-node@v4
      with:
        node-version: "24.14.1"
    - uses: oven-sh/setup-bun@v2
      with:
        bun-version: "1.3.13"
    - uses: actions/cache@v4
      with:
        path: node_modules
        key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
        restore-keys: |
          ${{ runner.os }}-bun-
    - run: bun install
      shell: bash
